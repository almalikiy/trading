# this is the main nginx configuration file successfully run this backend. 
# It sets up a reverse proxy to forward requests to the FastAPI backend running 
# on port 8001, and also handles WebSocket connections for real-time features.
#
# frontend --> nginx (port 8080) --reverse proxy--> backend (port 8001)
#
# 2 critical things to note in this configuration:
# 1. CORS headers are added in nginx to allow the frontend (running on a different origin) to access the backend API without CORS issues. The configuration also includes handling for preflight OPTIONS requests, which are part of the CORS mechanism.
# 2. WS location is set up to forward WebSocket connections to the backend, allowing for real-time communication features in the application.
#
# Copy this file to C:/program files/nginx/conf/nginx.conf and restart nginx to apply the changes.

#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    server {
        listen       8080;
        server_name  backend-trading.almalikiy.net;

        #access_log  logs/host.access.log  main;

        location / {
	        proxy_pass http://127.0.0.1:8001;
	        proxy_set_header Host $host;
        	proxy_set_header X-Real-IP $remote_addr;

        	# Tambahkan header CORS
        	#add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
		add_header 'Access-Control-Allow-Origin' $http_origin always;
        	add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        	add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';

		# Tangani preflight OPTIONS
		if ($request_method = OPTIONS) {
			add_header 'Access-Control-Allow-Origin' $http_origin;
        		add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        		add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
        		add_header 'Access-Control-Max-Age' 86400;
        		add_header 'Content-Length' 0;
        		add_header 'Content-Type' 'text/plain';
        		return 204;
		}
        }

	# 🔑 Tambahkan ini untuk WebSocket
	location /ws/ {
		proxy_pass http://127.0.0.1:8001;
	        proxy_http_version 1.1;
	        proxy_set_header Upgrade $http_upgrade;
        	proxy_set_header Connection "Upgrade";
	        proxy_set_header Host $host;
	}

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        #
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
        #
        #location ~ \.php$ {
        #    root           html;
        #    fastcgi_pass   127.0.0.1:9000;
        #    fastcgi_index  index.php;
        #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
        #    include        fastcgi_params;
        #}

        # deny access to .htaccess files, if Apache's document root
        # concurs with nginx's one
        #
        #location ~ /\.ht {
        #    deny  all;
        #}
    }


